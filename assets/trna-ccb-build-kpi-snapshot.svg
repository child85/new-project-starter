<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">TRNA CCB Build KPI Snapshot</title>
  <desc id="desc">KPI overview of the AI-assisted creation of the TRNA Compliance Clipboard.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .gold { fill: #b59b4f; }
      .blue { fill: #007db8; }
      .blue-dark { fill: #005a8d; }
      .ink { fill: #222832; }
      .muted { fill: #536171; }
      .soft { fill: #f4f8fb; }
      .soft-blue { fill: #e8f3f9; }
      .line { stroke: #c9d7e2; stroke-width: 2; }
      .blue-line { stroke: #007db8; stroke-width: 5; }
      .gold-line { stroke: #b59b4f; stroke-width: 5; }
      .h1 { font: 700 58px Arial, Helvetica, sans-serif; }
      .h2 { font: 700 32px Arial, Helvetica, sans-serif; }
      .h3 { font: 700 25px Arial, Helvetica, sans-serif; }
      .num { font: 700 70px Arial, Helvetica, sans-serif; }
      .body { font: 400 25px Arial, Helvetica, sans-serif; }
      .small { font: 400 20px Arial, Helvetica, sans-serif; }
      .label { font: 700 20px Arial, Helvetica, sans-serif; letter-spacing: .5px; }
      .mono { font: 700 22px Consolas, "Courier New", monospace; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <rect class="gold" width="1920" height="14"/>

  <g transform="translate(80 58)">
    <rect class="blue" x="0" y="0" width="104" height="104"/>
    <text x="52" y="66" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">TRNA</text>
    <text class="h1 ink" x="134" y="45">TRNA CCB Build KPI Snapshot</text>
    <text class="body muted" x="137" y="88">AI-assisted creation of the TRNA Compliance Clipboard</text>
  </g>

  <g transform="translate(80 205)">
    <g>
      <rect class="soft" x="0" y="0" width="410" height="165"/>
      <line class="blue-line" x1="0" y1="0" x2="410" y2="0"/>
      <text class="num blue-dark" x="34" y="82">94</text>
      <text class="label muted" x="34" y="127">COMMITS SHIPPED</text>
    </g>
    <g transform="translate(450 0)">
      <rect class="soft" x="0" y="0" width="410" height="165"/>
      <line class="blue-line" x1="0" y1="0" x2="410" y2="0"/>
      <text class="num blue-dark" x="34" y="82">8,539</text>
      <text class="label muted" x="34" y="127">TRACKED LINES</text>
    </g>
    <g transform="translate(900 0)">
      <rect class="soft" x="0" y="0" width="410" height="165"/>
      <line class="blue-line" x1="0" y1="0" x2="410" y2="0"/>
      <text class="num blue-dark" x="34" y="82">~20 h</text>
      <text class="label muted" x="34" y="127">ESTIMATED ACTIVE BUILD TIME</text>
    </g>
    <g transform="translate(1350 0)">
      <rect class="soft" x="0" y="0" width="410" height="165"/>
      <line class="blue-line" x1="0" y1="0" x2="410" y2="0"/>
      <text class="num blue-dark" x="34" y="82">15.75</text>
      <text class="label muted" x="34" y="127">CALENDAR DAYS</text>
    </g>
  </g>

  <g transform="translate(80 430)">
    <rect x="0" y="0" width="1120" height="300" fill="#ffffff" stroke="#c9d7e2" stroke-width="2"/>
    <text class="h2 blue-dark" x="34" y="54">Build Effort Comparison</text>
    <text class="small muted" x="34" y="91">Estimated active effort based on repository history and public labor assumptions.</text>

    <text class="label ink" x="34" y="151">WITH CODEX</text>
    <rect x="270" y="122" width="145" height="44" fill="#007db8"/>
    <text class="body ink" x="440" y="153">~20 active hours</text>

    <text class="label ink" x="34" y="222">NO-AI PROTOTYPE</text>
    <rect x="270" y="193" width="710" height="44" fill="#d9e3eb"/>
    <rect x="270" y="193" width="36" height="44" class="gold"/>
    <text class="body ink" x="1002" y="224">160-320 hours</text>

    <text class="small muted" x="34" y="270">Exact Codex thinking time is not exposed; active time is estimated from commit timing with idle gaps capped.</text>
  </g>

  <g transform="translate(1240 430)">
    <rect x="0" y="0" width="300" height="300" fill="#ffffff" stroke="#c9d7e2" stroke-width="2"/>
    <line class="gold-line" x1="0" y1="0" x2="300" y2="0"/>
    <text class="label muted" x="30" y="55">AI MODEL COST ESTIMATE</text>
    <text class="num blue-dark" x="30" y="132">$30-</text>
    <text class="num blue-dark" x="30" y="204">$160</text>
    <text class="small muted" x="30" y="252">rough token-cost scenario</text>
  </g>

  <g transform="translate(1580 430)">
    <rect x="0" y="0" width="260" height="300" fill="#ffffff" stroke="#c9d7e2" stroke-width="2"/>
    <line class="gold-line" x1="0" y1="0" x2="260" y2="0"/>
    <text class="label muted" x="26" y="55">NO-AI PROTOTYPE</text>
    <text class="num blue-dark" x="26" y="132">$16k-</text>
    <text class="num blue-dark" x="26" y="204">$45k</text>
    <text class="small muted" x="26" y="252">internal build effort</text>
  </g>

  <g transform="translate(80 780)">
    <rect x="0" y="0" width="1760" height="185" fill="#1f2933"/>
    <text x="34" y="52" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Delivered Capability</text>
    <g fill="none" stroke="#ffffff" stroke-width="3" opacity=".92">
      <rect x="40" y="82" width="34" height="25"/>
      <rect x="260" y="82" width="34" height="25"/>
      <circle cx="497" cy="95" r="17"/>
      <path d="M720 82h34v25h-34z"/>
      <path d="M939 83h36v22h-36m9 0v12h18v-12"/>
      <circle cx="1160" cy="95" r="18"/>
      <path d="M1378 80l22 16-22 16z"/>
      <path d="M1605 78h36v36h-36zM1614 87h18v18h-18z"/>
    </g>
    <g fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="22">
      <text x="40" y="142">Frontend app</text>
      <text x="260" y="142">Lambda backend</text>
      <text x="480" y="142">DynamoDB state</text>
      <text x="700" y="142">API Gateway</text>
      <text x="920" y="142">GitHub deploy</text>
      <text x="1140" y="142">Daily Watch</text>
      <text x="1360" y="142">Customer enrichment</text>
      <text x="1580" y="142">Impact reviews</text>
    </g>
  </g>

  <text class="small muted" x="80" y="1025">Based on repo history and public pricing assumptions. Production hardening still requires SSO, monitoring, backups, tests, and deployment governance.</text>
</svg>
